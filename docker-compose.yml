services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-22}
        PYTHON_VERSION: ${PYTHON_VERSION:-3.13}
    container_name: ani-col-reg-app
    restart: unless-stopped
    env_file:
      - path: ${ANI_COL_ENV_FILE:-./runtime/.env}
        required: false
    environment:
      - ANI_COL_PORT=${ANI_COL_PORT:-8060}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ${ANI_COL_ROOT_DIR:-./runtime}/data:/app/data
    ports:
      - "${ANI_COL_PORT:-8060}:${ANI_COL_PORT:-8060}"
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; port = os.getenv('ANI_COL_PORT', '8060'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

